# Example only: adapt namespace, image registry, secrets, and probes before production use.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carkeeper-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carkeeper-api
  template:
    metadata:
      labels:
        app: carkeeper-api
    spec:
      containers:
        - name: api
          image: your-registry/carkeeper-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: carkeeper-api-env
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: carkeeper-api
spec:
  selector:
    app: carkeeper-api
  ports:
    - port: 8080
      targetPort: 8080
