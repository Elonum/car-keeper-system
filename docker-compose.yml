services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carkeeper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carkeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENV: development
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: carkeeper
      DB_SSLMODE: disable
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      JWT_SECRET: dev-only-change-in-real-deployment
      DOCUMENT_STORAGE_ROOT: /app/data/documents
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:80
    ports:
      - "8080:8080"
    volumes:
      - api_documents:/app/data/documents
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  pgdata:
  api_documents:
